name: Deploy to Github Pages

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            # Give the default GITHUB_TOKEN write permission to commit and push the
            # added or changed files to the repository.
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Cache Hugo resources
              uses: actions/cache@v4
              env:
                  cache-name: cache-hugo-resources
              with:
                  path: resources
                  key: ${{ env.cache-name }}

            - uses: actions/setup-go@v5
              with:
                  go-version: '^1.17.0'
            - run: go version

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v2
              with:
                  hugo-version: 'latest'
                  # hugo-version: "0.139.4"
                  extended: true

            - name: Build
              run: |
                  if [ "${{ github.repository }}" == "HyunJay52/aqua-crew-project" ]; then
                    echo "Building for Staging..."
                    hugo --minify --gc --baseURL "https://hyunjay52.github.io/aqua-crew-project/"
                    # Remove CNAME for staging to avoid domain conflict
                    rm -f public/CNAME
                  else
                    echo "Building for Production..."
                    hugo --minify --gc
                  fi

            - name: Deploy 🚀
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: gh-pages
                  folder: public
                  clean: true
                  single-commit: true
